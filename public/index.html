<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sudoku Solver</title>
    <style>
      :root {
        --theme-color: #0066ff;
      }
      .buttons {
        display: flex;
        gap: 1rem;
        margin: 1rem;
      }
      #importDialog {
      }
      #importTextarea {
        width: 9rem;
        height: 9rem;
        font-size: 1rem;
      }
      #sudokuTable {
        border-collapse: collapse;
      }
      #sudokuTable td {
        outline: 1px solid #000;
        padding: 0;
        --size: 3rem;
        width: var(--size);
        height: var(--size);
        position: relative;
      }
      #sudokuTable td input {
        width: var(--size);
        height: var(--size);
        padding: 0.25rem;
        text-align: center;
        font-size: var(--size);
        border: none;
        background-color: transparent;
      }
      #sudokuTable input[data-state='fixed'] {
        color: #000;
      }
      #sudokuTable input[data-state='unknown'] {
        color: var(--theme-color);
      }
      #sudokuTable input[data-state='wrong'] {
        color: #f00;
      }
      .possible-values--container {
        pointer-events: none;
        position: absolute;
        display: flex;
        flex-wrap: wrap;
        top: 0;
        left: 0;
        width: calc(var(--size) + 0.5rem);
        height: calc(var(--size) + 0.5rem);
        font-size: calc(var(--size) / 3);
        /* background-color: rgba(0, 0, 0, 0.5); */
      }
      #sudokuTable.hide-hint .possible-values--container {
        display: none;
      }
      .possible-values--item {
        width: calc((var(--size) + 0.5rem) / 3);
        height: calc((var(--size) + 0.5rem) / 3);
        outline: 1px solid #ccc;
        background-color: #eee;
        color: #000;
        text-align: center;
        opacity: 0.8;
      }
      [hidden] {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <h1>Sudoku Solver</h1>
    <div class="buttons">
      <button id="emptyButton">Empty</button>
      <button id="startButton">Start</button>
      <button id="importButton">Import</button>
      <button id="exportButton">Export</button>
      <button id="resetButton">Reset</button>
      <button id="showHintButton">Show Hint</button>
      <button id="hideHintButton">Hide Hint</button>
      <button id="solveButton">Solve</button>
    </div>
    <dialog id="importDialog">
      <textarea
        id="importTextarea"
        placeholder="Paste sudoku table here"
      ></textarea>
      <div class="buttons">
        <button onclick="importDialog.close()">Close</button>
      </div>
    </dialog>
    <table id="sudokuTable">
      <tbody id="sudokuTableBody"></tbody>
    </table>
    <script src="bundle.js"></script>
  </body>
</html>
